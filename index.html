<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adeperl 🍁 — Links</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --forest:   #0F2318;
      --forest-mid: #1A3A2A;
      --forest-light: #254D38;
      --gold:     #C9A84C;
      --gold-light: #E0C06A;
      --gold-dim: #8A6E2E;
      --cream:    #F5F0E8;
      --cream-dim: #BFB89C;
      --white:    #FFFFFF;
    }

    html, body {
      height: 100%;
      background: var(--forest);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    /* ── Ambient leaves ── */
    .leaves-bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      overflow: hidden;
    }
    .leaf {
      position: absolute;
      font-size: clamp(1.2rem, 3vw, 2.4rem);
      opacity: 0;
      animation: floatLeaf linear infinite;
      filter: drop-shadow(0 0 6px rgba(201,168,76,0.35));
    }
    @keyframes floatLeaf {
      0%   { transform: translateY(110vh) rotate(0deg) scale(0.7); opacity: 0; }
      8%   { opacity: 0.18; }
      90%  { opacity: 0.12; }
      100% { transform: translateY(-12vh) rotate(360deg) scale(1); opacity: 0; }
    }

    /* ── Layout ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2.5rem 1.25rem 3rem;
      gap: 0;
    }

    /* ── Card ── */
    .card {
      width: 100%; max-width: 440px;
      background: linear-gradient(160deg, rgba(26,58,42,0.92) 0%, rgba(15,35,24,0.97) 100%);
      border: 1px solid rgba(201,168,76,0.22);
      border-radius: 20px;
      padding: 2.5rem 2rem 2.2rem;
      box-shadow:
        0 0 0 1px rgba(201,168,76,0.07),
        0 8px 40px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(201,168,76,0.12);
      display: flex; flex-direction: column; align-items: center; gap: 0;
    }

    /* ── Avatar ring ── */
    .avatar-ring {
      width: 110px; height: 110px;
      border-radius: 50%;
      background: #000;
      margin-bottom: 1.1rem;
      box-shadow: 0 0 28px rgba(201,168,76,0.35), 0 0 8px rgba(201,168,76,0.15);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .avatar-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      overflow: hidden;
      padding: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .avatar-inner img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      border-radius: 50%;
    }

    /* ── Name block ── */
    .name-block { text-align: center; margin-bottom: 0.3rem; }

    .nickname {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 8vw, 3.2rem);
      font-weight: 700;
      color: var(--gold-light);
      letter-spacing: 0.02em;
      line-height: 1.1;
    }
    .maple-leaf { font-style: normal; }

    .fullname {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 400;
      color: var(--cream-dim);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-top: 0.45rem;
    }

    /* ── Divider ── */
    .divider {
      width: 90px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold-light), var(--gold), var(--gold-light), transparent);
      box-shadow: 0 0 10px rgba(201,168,76,0.8), 0 0 22px rgba(201,168,76,0.45);
      border-radius: 2px;
      margin: 1.2rem 0 1.6rem;
    }

    /* ── Tagline ── */
    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.12rem;
      font-style: italic;
      color: var(--cream-dim);
      text-align: center;
      margin-bottom: 1.8rem;
      letter-spacing: 0.01em;
      line-height: 1.7;
    }

    /* ── Link buttons ── */
    .links { width: 100%; display: flex; flex-direction: column; gap: 0.85rem; }

    .link-btn {
      display: flex; align-items: center; gap: 0.9rem;
      width: 100%;
      padding: 0.9rem 1.2rem;
      border-radius: 12px;
      border: 1px solid rgba(201,168,76,0.22);
      background: rgba(255,255,255,0.03);
      color: var(--cream);
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: all 0.28s cubic-bezier(0.22,1,0.36,1);
      position: relative;
      overflow: hidden;
    }
    .link-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(100deg, rgba(201,168,76,0.08) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.28s;
    }
    .link-btn:hover, .link-btn:focus-visible {
      border-color: rgba(201,168,76,0.55);
      background: rgba(201,168,76,0.07);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(201,168,76,0.15);
      color: var(--gold-light);
    }
    .link-btn:hover::before { opacity: 1; }
    .link-btn:active { transform: translateY(0); }

    .btn-icon {
      width: 36px; height: 36px; flex-shrink: 0;
      border-radius: 8px;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.2);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.28s;
    }
    .link-btn:hover .btn-icon {
      background: rgba(201,168,76,0.2);
    }
    .btn-icon svg { width: 18px; height: 18px; fill: var(--gold); }

    .btn-label { flex: 1; }
    .btn-name {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      color: inherit;
    }
    .btn-url {
      display: block;
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--cream-dim);
      margin-top: 1px;
      letter-spacing: 0.01em;
    }
    .btn-arrow {
      color: var(--gold-dim);
      font-size: 1rem;
      transition: transform 0.28s, color 0.28s;
    }
    .link-btn:hover .btn-arrow {
      transform: translateX(3px);
      color: var(--gold-light);
    }

    /* ── Footer credit ── */
    .footer-credit {
      margin-top: 2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: rgba(191,184,156,0.65);
      text-align: center;
      letter-spacing: 0.06em;
    }
    .footer-credit a {
      color: rgba(201,168,76,0.5);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-credit a:hover { color: var(--gold); }

    @media (prefers-reduced-motion: reduce) {
      .leaf { animation: none !important; }
      .link-btn { transition: none !important; }
    }
  </style>
</head>
